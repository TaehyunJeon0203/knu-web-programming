<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Bouncing Ball Example</title>
    <style>
      body {
        margin: 20px;
      }
      #box {
        position: relative;
        width: 500px;
        height: 350px;
        background-color: yellow;
        border: 1px dashed gray;
        overflow: hidden;
      }
      #ball {
        position: absolute;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: red;
        left: 0;
        top: 0;
      }
    </style>
</head>
<body>
<div id="box">
  <div id="ball"></div>
</div>
<script>
  var box = document.getElementById('box');
  var ball = document.getElementById('ball');

  var boxWidth = box.clientWidth;
  var boxHeight = box.clientHeight;
  var ballSize = ball.offsetWidth;

  var x = 50;
  var y = 50;
  var dx = 3;
  var dy = 2;

  function move() {
    x += dx;
    y += dy;

    if (x <= 0 || x + ballSize >= boxWidth) {
      dx = -dx;
      x += dx;
    }
    if (y <= 0 || y + ballSize >= boxHeight) {
      dy = -dy;
      y += dy;
    }

    ball.style.left = x + 'px';
    ball.style.top = y + 'px';
  }

  setInterval(move, 16);
</script>
</body>
</html>
