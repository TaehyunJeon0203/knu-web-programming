<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>onmousemove</title>
    <style>
      html, body, * {
        cursor: none !important;
      }
      #cursor {
        position: absolute;
        width: 2em;
        pointer-events: none;
        z-index: 9999;
      }
    </style>
</head>
<body>
<h3>이미지 커서 만들기</h3>
<hr>
<p>마우스를 움직이면 이미지로 만든 커서가 마우스를 따라 다닙니다</p>
<img id="cursor" src="spongebob.png" alt="">
<script>
  document.onmousemove = function (e) {
    var img = document.getElementById('cursor');
    img.style.left = e.clientX + 'px';
    img.style.top = e.clientY + 'px';
  };
</script>
</body>
</html>
