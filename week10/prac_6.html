<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Form</title>
    <style>
      table {
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid black;
        padding: 0.2em 0.4em;
      }
      input {
        width: 5em;
        border: none;
      }
    </style>
</head>
<body>
<h3>서적 주문 양식</h3>
<hr>
<p>주문서</p>
<table>
  <tr>
    <th>책 제목</th>
    <th>가격</th>
    <th>수량</th>
    <th>합계</th>
  </tr>
  <tr>
    <td>웹프로그래밍</td>
    <td>25,000원</td>
    <td><input type="text" id="q1" value="0"></td>
    <td><input type="text" id="s1" value="0">원</td>
  </tr>
  <tr>
    <td>자바프로그래밍</td>
    <td>27,000원</td>
    <td><input type="text" id="q2" value="0"></td>
    <td><input type="text" id="s2" value="0">원</td>
  </tr>
  <tr>
    <td>알고리즘</td>
    <td>25,000원</td>
    <td><input type="text" id="q3" value="0"></td>
    <td><input type="text" id="s3" value="0">원</td>
  </tr>
  <tr>
    <td>합계</td>
    <td></td>
    <td><input type="text" id="qt" value="0"></td>
    <td><input type="text" id="st" value="0">원</td>
  </tr>
</table>
<br>
<input type="button" value="합계계산" onclick="calc()">
<input type="button" value="초기화" onclick="reset()">
<script>
  var prices = [25000, 27000, 25000];
  function calc() {
    var totalQty = 0, totalSum = 0;
    for (var i = 1; i <= 3; i++) {
      var q = parseInt(document.getElementById('q' + i).value) || 0;
      var s = q * prices[i - 1];
      document.getElementById('s' + i).value = s;
      totalQty += q;
      totalSum += s;
    }
    document.getElementById('qt').value = totalQty;
    document.getElementById('st').value = totalSum;
  }
  function reset() {
    for (var i = 1; i <= 3; i++) {
      document.getElementById('q' + i).value = '0';
      document.getElementById('s' + i).value = '0';
    }
    document.getElementById('qt').value = '0';
    document.getElementById('st').value = '0';
  }
</script>
</body>
</html>
