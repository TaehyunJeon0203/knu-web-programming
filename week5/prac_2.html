<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카푸치노 만들기</title>
    <style>
        div {
            width: 50%;
            height: 80%;
            border: 2px solid brown;

            padding: 30px;
        }

        #title {
            text-align: center;
        }

        ol {
            list-style-type: none;
        }

        ol li::marker {
            color: darkgreen;
            font-size: 50px;
            font-style: italic;
            font-weight: bold;
            padding-top: 5px;

        }

        li:nth-child(1)::marker {
            content: '1. ';
        }

        li:nth-child(2)::marker {
            content: '2. ';
        }

        li:nth-child(3)::marker {
            content: '3. ';
        }

        li:nth-child(4)::marker {
            content: '4. ';
        }
    </style>
</head>

<body>
    <h2>카푸치노</h2>
    <hr>
    <div>
        <h2 id="title">카푸치노 만드는 순서</h2>
        <ol>
            <li>에스프레소를 추출한다. 반드시 에스프레소 콩을 사용해야 제맛이 난다.</li>
            <li>적당한 용기에 우유를 넣어 중탕을 하거나 끓기 직전까지 데운다.</li>
            <li>몇초간 저어 충분히 거품을 낸다. 거품이 충분하지 않으면 풍미가 떨어진다.</li>
            <li>컵에 계피 막대를 꽂고 커피를 부은후 우유 거품을 붓는다. 휘핑크림을 얹고 계피가루를 뿌린다.</li>
        </ol>
    </div>
</body>

</html>
