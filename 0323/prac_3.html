<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폼-수강과목 목록</title>
</head>

<body>
    <form>
        <h3>수강과목조사</h3><br>
        <label>이름: <input type="text" required></label><br>
        <label>학과: <input type="text" required></label><br>
        <label>학년: <select required>
                <option value="1">1학년</option>
                <option value="2">2학년</option>
                <option value="3">3학년</option>
                <option value="4">4학년</option>
            </select></label><br>
        <label>수강과목(중복선택가능):<select multiple>
                <option value="math">웹프로그래밍</option>
                <option value="science">자바프로그래밍1</option>
                <option value="english">자바프로그래밍2</option>
            </select></label><br>
        <button type="submit">확인</button>
        <button type="reset">취소</button>
    </form>

</body>

</html>
